    - effect:particles{particle=block;material=stone;amount=120;hS=3;vS=1} @self
    - effect:particles{particle=sonic_boom;amount=8;hS=2;vS=0.5} @self
    - damage{a=25} @EntitiesNearOrigin{r=10}
    - damage{a=25} @EntitiesNearOrigin{r=1}
    - damage{a=25} @EntitiesNearOrigin{r=0}

    - throw{velocity=10;velocityY=1} @PlayersNearOrigin{r=10}

