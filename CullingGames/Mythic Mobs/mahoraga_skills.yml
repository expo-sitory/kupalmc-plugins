# PASSIVE
MahoragaAura:
  Skills:
  - potion{type=BLINDNESS;duration=60;hasParticles=false} @PlayersInRadius{r=8}
  - potion{type=SLOW;duration=60;hasParticles=false} @PlayersInRadius{r=8}
  - potion{type=WITHER;duration=60;hasParticles=false} @PlayersInRadius{r=8}
  - potion{type=HUNGER;duration=60;hasParticles=false} @PlayersInRadius{r=8}
  


# SKILLS:

random:
  Conditions:
   - playersinradius{a=>0;r=5} true
   - stance{s=normal;str=true} true
  Skills:
   - setstance{stance=randomSkill} @self
   - setAI{ai=false} @self
   - state{s=walk;remove=true} @self
   - state{s=run;remove=true} @self
   - state{s=smash;remove=true} @self
   - state{s=quickSmash;remove=true} @self
   - state{s=airSmash;remove=true} @self
   - state{s=heavyBladeSlash;remove=true} @self
   - state{s=quickBladeSlash;remove=true} @self
   - randomskill{skills=smash,quickSmash;sync=true} @self

# AIR SMASH
airSmash:
  Conditions:
    - playersinradius{a=>0;r=30} true
    - stance{s=normal;str=true} true
  Skills:
    - setAI{ai=false} @self
    - state{s=walk;remove=true} @self
    - state{s=run;remove=true} @self
    - state{s=punch;remove=true} @self
    - state{s=smash;remove=true} @self
    - state{s=quickSmash;remove=true} @self
    - state{s=heavyBladeSlash;remove=true} @self
    - state{s=quickBladeSlash;remove=true} @self

    - state{state=airSmash} @self
    - setstance{stance=airSmash} @self
    
    - effect:particles{particle=portal;amount=80;hS=1;vS=1;speed=0.2} @self
    - effect:particles{particle=cloud;amount=150;hS=4;vS=1;speed=0.15} @self
    - effect:particles{particle=soul;amount=40;hS=0.5;vS=1;speed=0.05} @self

    - effect:sound{s=entity.evoker.prepare_attack;v=2;p=0.5} @self
    
    - delay 40

    - teleport @NearestPlayer{r=30}
    
    - delay 5
    
    - effect:particles{particle=reverse_portal;amount=100;hS=1;vS=1;speed=0.3} @self
    - effect:sound{s=entity.generic.explode;v=2;p=0.6} @self
    - effect:sound{s=entity.warden.attack_impact;v=2;p=0.7} @self
    - effect:particles{particle=explosion_emitter;amount=1} @self
    - effect:particles{particle=cloud;amount=150;hS=4;vS=1;speed=0.15} @self
    - effect:particles{particle=block;material=stone;amount=120;hS=3;vS=1} @self
    - effect:particles{particle=sonic_boom;amount=8;hS=2;vS=0.5} @self
    
    - delay 5
    
    - damage{a=50} @EntitiesNearOrigin{r=20}
    - damage{a=50} @EntitiesNearOrigin{r=1}
    - damage{a=50} @EntitiesNearOrigin{r=0}
    - throw{velocity=15;velocityY=5} @PlayersNearOrigin{r=10}

    - delay 150
    - setstance{stance=normal} @self
    - setAI{ai=true} @self

