adaptMaster:
  Triggers:
  - onDamaged
  Skills:
    # Lava
    - skill{s=trackLavaDamage} @self ?damagecause{cause=LAVA}
    - skill{s=LavaAdapted} @self ?damagecause{cause=LAVA}
    
    # Entity Explosion
    - skill{s=trackEntityExplosionDamage} @self ?damagecause{cause=ENTITY_EXPLOSION}
    - skill{s=EntityExplosionAdapted} @self ?damagecause{cause=ENTITY_EXPLOSION}
    
    # Block Explosion
    - skill{s=trackBlockExplosionDamage} @self ?damagecause{cause=BLOCK_EXPLOSION}
    - skill{s=BlockExplosionAdapted} @self ?damagecause{cause=BLOCK_EXPLOSION}
    
    # Fire
    - skill{s=trackFireDamage} @self ?damagecause{cause=FIRE}
    - skill{s=FireAdapted} @self ?damagecause{cause=FIRE}
    
    # Fire Tick
    - skill{s=trackFireTickDamage} @self ?damagecause{cause=FIRE_TICK}
    - skill{s=FireTickAdapted} @self ?damagecause{cause=FIRE_TICK}
    
    # Drowning
    - skill{s=trackDrowningDamage} @self ?damagecause{cause=DROWNING}
    - skill{s=DrowningAdapted} @self ?damagecause{cause=DROWNING}
    
    # Suffocation
    - skill{s=trackSuffocationDamage} @self ?damagecause{cause=SUFFOCATION}
    - skill{s=SuffocationAdapted} @self ?damagecause{cause=SUFFOCATION}
    
    # Lightning
    - skill{s=trackLightningDamage} @self ?damagecause{cause=LIGHTNING}
    - skill{s=LightningAdapted} @self ?damagecause{cause=LIGHTNING}
    
    # Magic
    - skill{s=trackMagicDamage} @self ?damagecause{cause=MAGIC}
    - skill{s=MagicAdapted} @self ?damagecause{cause=MAGIC}
    
    # Wither
    - skill{s=trackWitherDamage} @self ?damagecause{cause=WITHER}
    - skill{s=WitherAdapted} @self ?damagecause{cause=WITHER}
    
    # Poison
    - skill{s=trackPoisonDamage} @self ?damagecause{cause=POISON}
    - skill{s=PoisonAdapted} @self ?damagecause{cause=POISON}
    
    # Starvation
    - skill{s=trackStarvationDamage} @self ?damagecause{cause=STARVATION}
    - skill{s=StarvationAdapted} @self ?damagecause{cause=STARVATION}
    
    # Dragon Breath
    - skill{s=trackDragonBreathDamage} @self ?damagecause{cause=DRAGON_BREATH}
    - skill{s=DragonBreathAdapted} @self ?damagecause{cause=DRAGON_BREATH}
    
    # Falling Block
    - skill{s=trackFallingBlockDamage} @self ?damagecause{cause=FALLING_BLOCK}
    - skill{s=FallingBlockAdapted} @self ?damagecause{cause=FALLING_BLOCK}
    
    # Freezing
    - skill{s=trackFreezingDamage} @self ?damagecause{cause=FREEZING}
    - skill{s=FreezingAdapted} @self ?damagecause{cause=FREEZING}
    
    # Hot Floor
    - skill{s=trackHotFloorDamage} @self ?damagecause{cause=HOT_FLOOR}
    - skill{s=HotFloorAdapted} @self ?damagecause{cause=HOT_FLOOR}
    
    # Thorns
    - skill{s=trackThornsDamage} @self ?damagecause{cause=THORNS}
    - skill{s=ThornsAdapted} @self ?damagecause{cause=THORNS}
    
    # World Border
    - skill{s=trackWorldBorderDamage} @self ?damagecause{cause=WORLD_BORDER}
    - skill{s=WorldBorderAdapted} @self ?damagecause{cause=WORLD_BORDER}
    
    # Cramming
    - skill{s=trackCrammingDamage} @self ?damagecause{cause=CRAMMING}
    - skill{s=CrammingAdapted} @self ?damagecause{cause=CRAMMING}

adaptMessage:
  Skills:     
    - message{m=&d&lᴋᴜᴘᴀʟᴍᴄ &r&7- &fᴄᴜʟʟɪɴɢ ɢᴀᴍᴇꜱ  &7|  &fMahoraga just experienced a new type of damage source, it is only just a matter of time before he adapts to it...} @PIR{r=1000}

# ===== LAVA =====
trackLavaDamage:
  Cooldown: 20
  Conditions:
    - variableequals{var=caster.LavaAdapted;value="false"}
  Skills:
    - variableadd{var=caster.LavaAdaptCount;amount=1} @self
    - skill{s=adaptMessage;cd=1728000} @self
    - message{m=&f[Debug] Lava Adaptation Flag &a<caster.var.LavaAdaptCount>/5} @PIR{r=1000}
    - skill{s=adaptingToLava} @self ?variableequals{var=caster.LavaAdaptCount;value="5"}

adaptingToLava:
  Cooldown: 1728000
  Skills:
    - setAI{ai=false} @self
    - setvariable{var=caster.Adapting;type=BOOLEAN;val=true} @self
    - state{state=adapt} @self
    - effect:particles{particle=dripping_lava;amount=150;hS=3;vS=3;speed=0.5} @self
    - effect:particles{particle=soul_fire_flame;amount=80;hS=1.5;vS=1.5;speed=0.2} @self
    - effect:particles{particle=lava;amount=80;hS=2;vS=2;speed=0.3} @self
    - effect:particles{particle=explosion_emitter;amount=50;hS=2;vS=2} @self
    - effect:sound{s=entity.evoker.prepare_attack;v=2;p=1.0} @self
    - effect:sound{s=entity.warden.prepare_attack;v=2.5;p=0.8} @self
    - effect:particles{particle=flame;amount=100;hS=5;vS=0.1;speed=0.2;repeat=8;repeatinterval=10} @self
    - delay 40
    - command{c="particle minecraft:elder_guardian <caster.l.x> <caster.l.y> <caster.l.z> 0 0 0 10 10 force @a"}
    - command{c="playsound minecraft:entity.elder_guardian.curse master @a <caster.l.x> <caster.l.y> <caster.l.z> 62.5 1"}
    - delay 40
    - blackscreen{d=2} @PlayersInRadius{r=100}
    - effect:particles{particle=lava;amount=300;hS=4;vS=4;speed=1} @self
    - effect:particles{particle=dripping_lava;amount=200;hS=5;vS=5;speed=0.8} @self
    - effect:particles{particle=explosion_emitter;amount=100;hS=4;vS=4} @self
    - effect:sound{s=entity.generic.explode;v=2;p=0.6} @self
    - heal{a=0.1} @self
    - effect:particles{particle=happy_villager;amount=40;hS=1;vS=1;speed=0.15} @self
    - effect:sound{s=entity.player.levelup;v=2;p=1.0} @self
    - message{m=&d&lᴋᴜᴘᴀʟᴍᴄ &r&7- &fᴄᴜʟʟɪɴɢ ɢᴀᴍᴇꜱ  &7|  &fMahoraga Successfuly Adapted to &6Lava} @PIR{r=1000}
    - sendtitle{title="&eᴍᴀʜᴏʀᴀɢᴀ";subtitle="&fᴀᴅᴀᴘᴛᴇᴅ ᴛᴏ &6ʟᴀᴠᴀ";d=100} @PlayersInRadius{r=1000}
    - heal{a=200} @self
    - delay 20
    - effect:particles{particle=flash;amount=20} @self
    - delay 20
    - setvariable{var=caster.LavaAdapted;type=BOOLEAN;val=true} @self
    - setvariable{var=caster.LavaAdaptCount;type=INTEGER;val=0} @self
    - setstance{stance=normal} @self
    - setAI{ai=false} @self
    - setvariable{var=caster.Adapting;type=BOOLEAN;val=false} @self

LavaAdapted:
  Conditions:
  - damagecause{cause=LAVA}  
  - variableequals{var=caster.LavaAdapted;value="true"}
  Skills:
    - cancelevent

